name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Backend install
        working-directory: backend
        run: npm ci
      - name: Backend lint
        working-directory: backend
        run: npm run lint
      - name: Backend test
        working-directory: backend
        run: npm run test
      - name: Backend build
        working-directory: backend
        run: npm run build
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Frontend build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Package source
        run: |
          tar \
            --exclude='.git' \
            --exclude='backend/node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='backend/dist' \
            --exclude='frontend/dist' \
            --exclude='frontend/tsconfig.tsbuildinfo' \
            --exclude='.env' \
            --exclude='.env.production' \
            -czf /tmp/projectflow.tar.gz .
      - name: Build production images
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          docker build --platform linux/amd64 -t projectflow-backend:prod -f backend/Dockerfile.prod backend
          docker build --platform linux/amd64 -t projectflow-frontend:prod -f frontend/Dockerfile.prod --build-arg VITE_API_URL="$VITE_API_URL" frontend
          docker save projectflow-backend:prod projectflow-frontend:prod | gzip > /tmp/projectflow-images.tar.gz
      - name: Upload and deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/projectflow_key
          chmod 600 ~/.ssh/projectflow_key
          {
            printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'FRONTEND_URL=%s\n' "$FRONTEND_URL"
            printf 'VITE_API_URL=%s\n' "$VITE_API_URL"
            printf 'BACKEND_PORT=%s\n' "127.0.0.1:3000"
            printf 'FRONTEND_PORT=%s\n' "127.0.0.1:8080"
            printf 'AI_PROVIDER=%s\n' "$AI_PROVIDER"
            printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY"
          } > /tmp/projectflow.env
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/projectflow_key "$VPS_USER@$VPS_HOST" "sudo mkdir -p /opt/projectflow && sudo chown -R $VPS_USER:$VPS_USER /opt/projectflow"
          scp -i ~/.ssh/projectflow_key /tmp/projectflow.tar.gz "$VPS_USER@$VPS_HOST:/tmp/projectflow.tar.gz"
          scp -i ~/.ssh/projectflow_key /tmp/projectflow-images.tar.gz "$VPS_USER@$VPS_HOST:/tmp/projectflow-images.tar.gz"
          scp -i ~/.ssh/projectflow_key /tmp/projectflow.env "$VPS_USER@$VPS_HOST:/tmp/projectflow.env"
          ssh -i ~/.ssh/projectflow_key "$VPS_USER@$VPS_HOST" "set -e
            cd /opt/projectflow
            tar -xzf /tmp/projectflow.tar.gz
            mv /tmp/projectflow.env .env.production
            docker load -i /tmp/projectflow-images.tar.gz
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --no-build
            docker image prune -f
            rm -f /tmp/projectflow.tar.gz /tmp/projectflow-images.tar.gz
          "
      - name: Healthcheck
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          sleep 20
          curl --fail --show-error --location "$FRONTEND_URL"
          curl --fail --show-error --location "$FRONTEND_URL/api/health"
